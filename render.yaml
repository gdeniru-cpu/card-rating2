services:
  - type: web_service
    name: card-rating2-backend
    env: node
    plan: free
    branch: main
    buildCommand: npm install --include=dev && npm --workspace backend run build
    startCommand: npm --workspace backend run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIRECRAWL_API_KEY
        sync: false
  - type: static_site
    name: card-rating2-frontend
    env: static
    plan: free
    branch: main
    buildCommand: npm install --include=dev && npm --workspace frontend run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://card-rating2-backend.onrender.com
